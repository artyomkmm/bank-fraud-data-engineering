rbk_dwh:
  target: "{{ env_var('DBT_TARGET', 'local') }}"
  outputs:
    local:
      type: clickhouse
      schema: default
      host: "{{ env_var('CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('CLICKHOUSE_PORT', '8123') | int }}"
      user: "{{ env_var('CLICKHOUSE_USER', 'app') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD', 'clickhouse_rbk') }}"
      secure: false
      verify: false
      custom_settings:
        allow_experimental_analyzer: 1
    docker:
      type: clickhouse
      schema: default
      host: clickhouse_dwh
      port: 8123
      user: app
      password: clickhouse_rbk
      secure: false
      verify: false
      custom_settings:
        allow_experimental_analyzer: 1
